<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Translator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #fff;
    font-family: Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .container {
    text-align: center;
  }
  h1 {
    color: #e94560;
    font-size: 36px;
    margin-bottom: 40px;
  }
  .links {
    display: flex;
    gap: 30px;
    justify-content: center;
  }
  a {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 280px;
    height: 180px;
    border-radius: 12px;
    text-decoration: none;
    color: #fff;
    font-weight: bold;
    transition: all 0.2s;
  }
  a:hover { transform: scale(1.05); }
  .mic-link {
    background: #0f3460;
    border: 2px solid #1a4a80;
  }
  .mic-link:hover { background: #153d6f; }
  .system-link {
    background: #533483;
    border: 2px solid #6a45a0;
  }
  .system-link:hover { background: #5f3d94; }
  .link-icon { font-size: 48px; margin-bottom: 10px; }
  .link-title { font-size: 20px; margin-bottom: 6px; }
  .link-desc { font-size: 13px; color: #a8a8a8; font-weight: normal; }
</style>
</head>
<body>
<div class="container">
  <h1>Audio Translator</h1>
  <div class="links">
    <a href="mic.html" target="_blank" class="mic-link">
      <div class="link-icon">🎤</div>
      <div class="link-title">My Voice</div>
      <div class="link-desc">What I say → Translate</div>
    </a>
    <a href="system.html" target="_blank" class="system-link">
      <div class="link-icon">🔊</div>
      <div class="link-title">System Audio</div>
      <div class="link-desc">What I hear → Translate</div>
    </a>
  </div>
</div>
</body>
</html>
